<!doctype html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#090b14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <title>MyShift AI</title>
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>
  <a class="skip-link" href="#main">Aller au contenu</a>

  <main id="main" class="app-shell">
    <section id="authScreen" class="auth-screen">
      <div class="glass auth-card">
        <div class="brand-lockup">
          <div class="logo-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" width="28" height="28" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 33 24 8l14 25" />
              <path d="M15 24h18" />
            </svg>
          </div>
          <div>
            <h1>MyShift <span>AI</span></h1>
            <p>Gérez votre planning automatiquement.</p>
          </div>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" placeholder="vous@exemple.com">
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <div class="auth-actions">
          <button id="loginBtn" class="btn btn-primary">Connexion</button>
          <button id="registerBtn" class="btn btn-ghost">Créer un compte</button>
        </div>
        <p id="authMsg" class="auth-msg" role="status" aria-live="polite"></p>
      </div>
    </section>

    <section id="appScreen" class="app-screen hidden">
      <header class="topbar glass">
        <div class="topbar-left">
          <div>
            <div class="eyebrow">MyShift AI</div>
            <h2 id="monthTitle">Février 2026</h2>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="themeToggle" class="icon-btn" aria-label="Changer de thème">◐</button>
          <button id="importBtn" class="icon-btn" aria-label="Importer Excel">⇪</button>
          <button id="settingsBtn" class="icon-btn" aria-label="Paramètres">⚙</button>
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" hidden>
        </div>
      </header>

      <section class="calendar-card glass">
        <div class="month-nav">
          <button id="prevMonth" class="nav-btn" aria-label="Mois précédent">‹</button>
          <div class="month-labels">
            <div class="month-name" id="monthName">Février</div>
            <div class="month-year" id="monthYear">2026</div>
          </div>
          <button id="nextMonth" class="nav-btn" aria-label="Mois suivant">›</button>
        </div>
        <div id="weekdayHeader" class="weekday-header"></div>
        <div id="calendarGrid" class="calendar-grid"></div>
        <div class="month-stats">
          <div><strong id="countJ">0</strong><span>Jours</span></div>
          <div><strong id="countN">0</strong><span>Nuits</span></div>
          <div><strong id="countMN">0</strong><span>MN</span></div>
          <div><strong id="monthSalary">2093,06 €</strong><span>Est. Brut</span></div>
        </div>
      </section>

      <section class="detail-card glass" aria-live="polite">
        <div class="detail-head">
          <div>
            <p class="detail-kicker">Jour sélectionné</p>
            <h3 id="detailDate">Aucun jour</h3>
          </div>
          <div id="detailStatus" class="status-pill">—</div>
        </div>
        <div id="detailContent" class="detail-content">
          <p class="muted">Touchez une case du calendrier.</p>
        </div>
      </section>

      <nav class="dock glass" aria-label="Actions">
        <button class="dock-btn" data-status="jour">☀️<span>JOUR</span></button>
        <button class="dock-btn" data-status="nuit">🌙<span>NUIT</span></button>
        <button class="dock-btn" data-status="mn">🌆<span>MN</span></button>
        <button class="dock-btn" data-status="repos">🏠<span>REPOS</span></button>
        <button class="dock-btn" data-status="conges">🏖️<span>CONGÉS</span></button>
        <button class="dock-btn" id="noteBtn">📝<span>NOTE</span></button>
        <button class="dock-btn" id="otherBtn">⚙️<span>AUTRE</span></button>
        <button class="dock-btn danger" id="clearBtn">🗑️<span>EFFACER</span></button>
      </nav>
    </section>
  </main>

  <dialog id="noteModal" class="modal glass">
    <form method="dialog" class="modal-inner">
      <div class="modal-head"><h3>Note</h3><button class="x-btn" value="cancel" aria-label="Fermer">×</button></div>
      <textarea id="noteText" rows="5" placeholder="Écrire une note..."></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost" value="cancel">Annuler</button>
        <button id="saveNoteBtn" class="btn btn-primary" value="default">Sauvegarder</button>
      </div>
    </form>
  </dialog>

  <dialog id="otherModal" class="modal glass">
    <form method="dialog" class="modal-inner">
      <div class="modal-head"><h3>Code personnalisé</h3><button class="x-btn" value="cancel" aria-label="Fermer">×</button></div>
      <div id="customCodes" class="codes-grid"></div>
    </form>
  </dialog>

  <dialog id="settingsModal" class="modal glass">
    <form method="dialog" class="modal-inner settings-inner">
      <div class="modal-head"><h3>Paramètres</h3><button class="x-btn" value="cancel" aria-label="Fermer">×</button></div>
      <div class="field"><label for="rateBase">Base mensuelle</label><input id="rateBase" type="number" step="0.01" value="2093.06"></div>
      <div class="field"><label for="rateJour">Taux Jour</label><input id="rateJour" type="number" step="0.01" value="35"></div>
      <div class="field"><label for="rateNuit">Taux Nuit</label><input id="rateNuit" type="number" step="0.01" value="82"></div>
      <div class="field"><label for="rateMN">Taux MN</label><input id="rateMN" type="number" step="0.01" value="15"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" value="cancel">Fermer</button>
        <button id="saveSettingsBtn" class="btn btn-primary" value="default">Sauvegarder</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
